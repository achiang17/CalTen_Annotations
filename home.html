<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalTen Annotations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>CalTen Annotations</h1>
  </header>

  <div class="page-body">

    <!-- Annotator + Roster Setup -->
    <section style="max-width: 640px; margin-bottom: 32px;">
      <div class="card" style="padding: 20px;">
        <div style="margin-bottom: 16px;">
          <label for="annotator-name" style="display:block; font-size: 14px; font-weight: 500; margin-bottom: 6px;">Your Name (Annotator)</label>
          <input type="text" id="annotator-name" class="login-input" placeholder="Enter your name" style="max-width: 320px;" />
        </div>
        <div style="margin-bottom: 0;">
          <label for="roster-select" style="font-size: 14px; font-weight: 500; margin-right: 8px;">Team:</label>
          <select id="roster-select" class="roster-dropdown">
            <option value="men">Men's Roster</option>
            <option value="women">Women's Roster</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Session Browser -->
    <section style="max-width: 960px;">
      <p class="section-title">Sessions</p>
      <div id="folder-list" class="folder-list">
        <div class="empty-state">Loading sessions…</div>
      </div>
    </section>

  </div>

  <script src="auth.js"></script>
  <script>requireAuth();</script>
  <script src="app.js"></script>
</body>
</html>
