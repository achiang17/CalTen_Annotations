<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalTen Annotations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>CalTen Annotations</h1>
  </header>

  <div class="page-body">

    <!-- Player Roster Setup -->
    <section style="max-width: 640px; margin-bottom: 32px;">
      <p class="section-title">Player Roster</p>
      <div class="card roster-panel">
        <div style="margin-bottom: 12px;">
          <label for="roster-select" style="font-size: 14px; font-weight: 500; margin-right: 8px;">Team:</label>
          <select id="roster-select" class="roster-dropdown">
            <option value="men">Men's Roster</option>
            <option value="women">Women's Roster</option>
          </select>
        </div>
        <table class="roster-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Player Name</th>
            </tr>
          </thead>
          <tbody id="roster-body">
            <!-- Rows injected by app.js -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Session Browser -->
    <section style="max-width: 960px;">
      <p class="section-title">Sessions</p>
      <div id="folder-list" class="folder-list">
        <div class="empty-state">Loading sessions…</div>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
