<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CalTen Annotations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>CalTen Annotations</h1>
  </header>

  <div class="page-body" style="display:flex; justify-content:center; padding-top:80px;">
    <div class="card" style="max-width:360px; width:100%; padding:32px;">
      <p class="section-title" style="text-align:center; margin-bottom:24px;">Sign In</p>
      <div style="margin-bottom:16px;">
        <label for="login-password" style="display:block; font-size:14px; font-weight:500; margin-bottom:6px;">Password</label>
        <input type="password" id="login-password" class="login-input" placeholder="Enter password" autofocus />
      </div>
      <div style="margin-bottom:16px;">
        <label for="login-token" style="display:block; font-size:14px; font-weight:500; margin-bottom:6px;">Dropbox Token</label>
        <input type="password" id="login-token" class="login-input" placeholder="Paste Dropbox token" />
      </div>
      <div id="login-error" style="color:#dc2626; font-size:13px; margin-bottom:12px; display:none;"></div>
      <button class="btn btn-primary" id="btn-login" style="width:100%;">Sign In</button>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
