<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CalTen Annotations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>CalTen Annotations</h1>
  </header>

  <div class="page-body" style="display:flex; justify-content:center; padding-top:80px;">
    <div class="card" style="max-width:360px; width:100%; padding:32px;">
      <p class="section-title" style="text-align:center; margin-bottom:24px;">Sign In</p>

      <div id="password-section" style="margin-bottom:16px;">
        <label for="login-password" style="display:block; font-size:14px; font-weight:500; margin-bottom:6px;">Password</label>
        <input type="password" id="login-password" class="login-input" placeholder="Enter password" autofocus />
      </div>

      <div id="login-error" style="color:#dc2626; font-size:13px; margin-bottom:12px; display:none;"></div>
      <button class="btn btn-primary" id="btn-login" style="width:100%;">Sign In</button>

      <div id="dbx-section" style="display:none; text-align:center;">
        <p style="font-size:14px; color:#555; margin-bottom:16px;">Connect your Dropbox account to access session videos and save annotations.</p>
        <button class="btn btn-primary" id="btn-dbx-connect" style="width:100%;" onclick="startDropboxOAuth()">Connect with Dropbox</button>
        <div id="dbx-status" style="font-size:13px; margin-top:12px; display:none;"></div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
